
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Soporte MJGGC - Panel de Información</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffd900",
                        "bg-main": "var(--bg-main)",
                        "bg-card": "var(--bg-card)",
                        "text-base": "var(--text-main)",
                        "border-muted": "var(--border-muted)"
                    },
                    fontFamily: {
                        "sans": ["Public Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            :root {
                --bg-main: #f8f9fa;
                --bg-card: #ffffff;
                --text-main: #1a1a1a;
                --border-muted: #e5e7eb;
            }
            .dark {
                --bg-main: #1e1e1e;
                --bg-card: #262626;
                --text-main: #e5e7eb;
                --border-muted: #333333;
            }
            body {
                @apply bg-bg-main text-text-base selection:bg-primary selection:text-black font-sans antialiased transition-colors duration-300;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ffd900;
        }
    </style>
<script type="importmap">

}
